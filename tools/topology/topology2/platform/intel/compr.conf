
IncludeByKey.COMPRESSED_1 {
"true"	{
	Object.Pipeline.compr-playback [
		{
			index $COMPR_PIPELINE_ID

			Object.Widget.host-copier.1 {
				stream_name $COMPR_PCM_NAME
				pcm_id $COMPR_PCM_ID
				<include/formats/compr_input_audio_formats.conf>
				<include/formats/compr_output_audio_formats.conf>
			}

			Object.Widget.decoder.1 {
				core_id 1
				<include/formats/compr_input_audio_formats.conf>
				<include/formats/compr_output_audio_formats.conf>
			}

			# converts the input to S32_LE
			Object.Widget.module-copier.2 {
				<include/formats/compr_input_audio_formats.conf>
				<include/formats/compr_output_audio_formats_s32.conf>
			}

			# converts the input to 48KHz
			# note: this is wrong for 96/192KHz HiRes audio!!!!
			Object.Widget.src.1 {
				rate_out 48000

				<include/components/src_format_s32_convert_to_48k.conf>
			}

			Object.Widget.gain.1 {
				Object.Control.mixer.1 {
					name 'Pre Mixer $COMPR_PCM_NAME Volume'
				}
				num_input_audio_formats 1
				Object.Base.input_audio_format [
					{
						in_rate			48000
						in_bit_depth		32
						in_valid_bit_depth	32
					}
				]
				num_output_audio_formats 1
				Object.Base.output_audio_format [
					{
						out_rate		48000
						out_bit_depth		32
						out_valid_bit_depth	32
					}
				]
			}
			Object.Widget.mixin.1 {
				Object.Base.input_audio_format [
					{
						in_rate			48000
						in_bit_depth            32
						in_valid_bit_depth      32
					}
				]
				Object.Base.output_audio_format [
					{
						out_rate		48000
						out_bit_depth		32
						out_valid_bit_depth	32
					}
				]
			}
		}
	]

	Object.PCM.pcm [
		{
			name $COMPR_PCM_NAME
			id $COMPR_PCM_ID
			direction playback
			compress "true"

			Object.Base.fe_dai.1 {
				name "$COMPR_PCM_NAME"
			}

			Object.PCM.pcm_caps.1 {
				name $COMPR_PCM_NAME
				formats 'S32_LE'
				rates '8000'
			}
		}
	]

	Object.Base.route [
		{
			source  mixin.$COMPR_PIPELINE_ID.1
			sink	$COMPR_PIPELINE_SINK
		}
		{
			source  host-copier.$COMPR_PCM_ID.playback
			sink	decoder.$COMPR_PIPELINE_ID.1
		}
	]
}
}

