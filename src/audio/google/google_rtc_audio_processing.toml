#ifndef LOAD_TYPE
#define LOAD_TYPE "1"
#endif

	[[module.entry]]
	name = "RTC_AEC"
	uuid = UUIDREG_STR_GOOGLE_RTC_AUDIO_PROCESSING
	REM # bit #i = 1 means core #i is allowed.
	affinity_mask = "0x7"
	instance_count = "1"
	domain_types = "1"
	load_type = LOAD_TYPE
	module_type = "10"
	init_config = "1"
	auto_start = "0"
	sched_caps = [1, 0x00008000]

	REM # pin = [dir, type, sample rate, size, container, channel-cfg]
	pin = [0, 0, 0x8, 0x2, 0x2, 0x1,
		0, 0, 0x8, 0x2, 0x2, 0x4,
		1, 0, 0x8, 0x2, 0x2, 0x1]
	REM # mod_cfg [PAR_0 PAR_1 PAR_2 PAR_3 IS_BYTES CPS IBS OBS MOD_FLAGS CPC OBLS]
	mod_cfg = [0, 0, 0, 0, 4096, 1000000, 128, 128, 0, 0, 0]

	index = __COUNTER__
